name: Nightly

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config unzip

      - name: Build nightly binary
        run: ./scripts/package-release.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: termphonic-nightly-linux-x86_64
          path: |
            dist/termphonic
            dist/termphonic.sha256

      - name: Publish nightly release
        env:
          GH_TOKEN: ${{ github.token }}
          GIT_SHA: ${{ github.sha }}
        run: |
          NOTES="Automated nightly build from main at ${GIT_SHA}."
          if gh release view nightly >/dev/null 2>&1; then
            gh release edit nightly \
              --title "Termphonic Nightly" \
              --notes "$NOTES" \
              --prerelease
          else
            gh release create nightly \
              --title "Termphonic Nightly" \
              --notes "$NOTES" \
              --prerelease
          fi
          gh release upload nightly \
            dist/termphonic dist/termphonic.sha256 --clobber
